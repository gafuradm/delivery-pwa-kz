<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Доставка KZ</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <div id="app">
    <div id="auth">
      <h2>Клиент</h2>
      <input id="login" placeholder="Логин">
      <input id="pass" type="password" placeholder="Пароль">
      <button onclick="auth()">Войти</button>
    </div>

    <div id="clientPanel" style="display:none">
      <h3>Создать заказ</h3>
      <input id="pointA" placeholder="Откуда">
      <input id="pointB" placeholder="Куда">
      <input id="weight" type="number" placeholder="Вес кг" oninput="calcPrice()">
      <select id="urgent" onchange="calcPrice()">
        <option value="1">Обычная</option>
        <option value="1.5">Срочная</option>
      </select>
      <p>Цена: <span id="priceRes">0</span> тг</p>
      <button onclick="createOrder()">Оформить заказ</button>

      <h3>Карта</h3>
      <div id="map" style="width:100%;height:300px"></div>

      <h3>Мои заказы</h3>
      <div id="ordersList"></div>
    </div>
  </div>

  <script src="https://api-maps.yandex.ru/3.0/?apikey=f7f759d3-32a1-4a81-b0d6-af84623e1b4d&lang=ru_RU"></script>
  <script src="js/map.js"></script>
  <script src="js/client.js"></script>
</body>
</html>
