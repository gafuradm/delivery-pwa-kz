<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Курьер</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="authCourier">
    <h2>Курьер</h2>
    <input id="cLogin" placeholder="Логин">
    <input id="cPass" type="password" placeholder="Пароль">
    <button onclick="courierAuth()">Войти</button>
  </div>

  <div id="courierMain" style="display:none">
    <h3>Мои заказы</h3>
    <div id="courierOrders"></div>

    <div id="orderDetail" style="display:none">
      <h4 id="detailTitle"></h4>
      <p id="detailAddr"></p>
      <input type="file" id="cargoPhoto" accept="image/*">
      <button onclick="buildRoute()">Маршрут</button>
      <button onclick="setStatusArrive()">Прибыл</button>
      <button onclick="setStatusPick()">Забрал</button>
      <button onclick="setStatusOnWay()">В пути</button>
      <button onclick="setStatusDelivered()">Доставил</button>
      <canvas id="signCanvas" width="300" height="150" style="border:1px solid #000"></canvas>
      <button onclick="clearSign()">Очистить подпись</button>
    </div>
  </div>

  <script src="js/courier.js"></script>
</body>
</html>
